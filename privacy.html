      <h1>プライバシーポリシー</h1>
      <p>LaClass 6.0では、未ログイン時は入力された名簿・性別・NGペア・座席表・指名履歴・メモが利用者のブラウザ内に保存されます。</p>
      <p>Googleログイン後は、ログインした本人のデータとしてFirestoreに保存されます。自動保存機能により、編集内容がクラウドへ保存される場合があります。</p>
      <p>広告、アクセス解析、AI APIを導入する場合は、利用目的・保存方法・削除方法を明記します。</p>
